<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Signal — clarity emerging from confusion">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1E7D6"/><stop offset="1" stop-color="#FBF8F2"/>
    </linearGradient>
    <radialGradient id="sglow" cx="0.72" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8E83C7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8E83C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sstroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C06B4A"/><stop offset="1" stop-color="#9F4F2E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="600" rx="28" fill="url(#sbg)"/>
  <rect x="1" y="1" width="798" height="598" rx="27" fill="none" stroke="#E4DCCC" stroke-width="2"/>
  <circle cx="575" cy="300" r="230" fill="url(#sglow)"/>
  <!-- confusion: tangled faint lines -->
  <g fill="none" stroke="#241F1A" stroke-opacity="0.20" stroke-width="3" stroke-linecap="round">
    <path d="M90 210 C 160 150, 120 300, 210 250 S 150 380, 250 330"/>
    <path d="M110 330 C 190 300, 150 430, 260 360 S 210 250, 300 300"/>
    <path d="M95 270 C 170 240, 210 200, 250 290 S 190 340, 280 320"/>
    <path d="M130 400 C 210 360, 180 300, 300 340"/>
  </g>
  <!-- convergence into one clear stroke -->
  <path d="M280 320 C 360 300, 400 300, 470 300 S 560 300, 640 300"
        fill="none" stroke="url(#sstroke)" stroke-width="7" stroke-linecap="round"/>
  <!-- signal waves at the clear end -->
  <g fill="none" stroke="#C06B4A" stroke-linecap="round">
    <path d="M655 260 C 685 285, 685 315, 655 340" stroke-opacity="0.85" stroke-width="4"/>
    <path d="M680 240 C 725 278, 725 322, 680 360" stroke-opacity="0.5" stroke-width="4"/>
    <path d="M702 222 C 760 272, 760 328, 702 378" stroke-opacity="0.28" stroke-width="4"/>
  </g>
  <circle cx="640" cy="300" r="11" fill="#9F4F2E"/>
  <circle cx="640" cy="300" r="20" fill="none" stroke="#9F4F2E" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="150" cy="235" r="4" fill="#241F1A" fill-opacity="0.3"/>
  <circle cx="235" cy="420" r="4" fill="#241F1A" fill-opacity="0.25"/>
</svg>
